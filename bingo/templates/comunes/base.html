{% load static %}
<!DOCTYPE html>
<html lang="es" data-bs-theme="light" id="theme-element">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CoopBingo{% endblock %}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="crossorigin">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% include 'comunes/navbar.html' %}

<main class="container py-4">
    
    {% block content %}
    {% endblock %}
    
</main>

{% block modals %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="crossorigin"></script>
    
    <script src="{% static 'js/main.js' %}"></script>
    
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // Seleccionamos todos los botones de ojito que existan en la página
        const toggleButtons = document.querySelectorAll('.toggle-password-btn');
        
        toggleButtons.forEach(button => {
            button.addEventListener('click', function() {
                // Buscamos el input y el icono que están pegados a este botón específico
                const input = this.closest('.input-group').querySelector('.toggle-password-field');
                const icon = this.querySelector('i');
                
                // Lógica de alternancia (Toggle)
                if (input.type === 'password') {
                    input.type = 'text'; // Mostramos la contraseña
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash'); // Ponemos el ojito tachado
                } else {
                    input.type = 'password'; // Ocultamos la contraseña
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye'); // Ponemos el ojito normal
                }
            });
        });
    });
</script>

    {% block extra_js %}{% endblock %}
    {% include 'componentes/alertas.html' %} 
    
    </body>
</html>
